<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded rect -->
  <rect width="32" height="32" rx="7" fill="#0D0F14"/>

  <!-- Left chevron — pointing RIGHT (toward center) -->
  <polyline points="5,9 13,16 5,23"
    fill="none" stroke="#F59E0B" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center vertical separator -->
  <line x1="16" y1="9" x2="16" y2="23"
    stroke="#F59E0B" stroke-width="1.5"
    stroke-linecap="round" opacity="0.70"/>

  <!-- Right chevron — pointing LEFT (toward center) -->
  <polyline points="27,9 19,16 27,23"
    fill="none" stroke="#F59E0B" stroke-width="3"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
